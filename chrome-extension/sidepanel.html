<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f7ff;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 16px 20px;
      background: white;
      border-bottom: 1px solid #e5e0f5;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .header-title { font-size: 15px; font-weight: 700; }
    .header-title span {
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Platform pills */
    .platforms-bar {
      padding: 12px 20px;
      background: white;
      border-bottom: 1px solid #e5e0f5;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .platform-pill {
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid #e5e0f5;
      background: white;
      color: #6b7280;
      transition: all 0.15s;
    }
    .platform-pill.active {
      background: rgba(124, 58, 237, 0.08);
      border-color: rgba(124, 58, 237, 0.2);
      color: #7c3aed;
    }
    .platform-pill:hover { border-color: #7c3aed; }

    /* Content area */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    /* Status states */
    .state { display: none; }
    .state.active { display: block; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
    }
    .empty-icon {
      width: 56px; height: 56px;
      background: rgba(124, 58, 237, 0.05);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 24px;
    }
    .empty-title {
      font-size: 16px; font-weight: 700; margin-bottom: 8px;
    }
    .empty-desc {
      font-size: 13px; color: #6b7280; line-height: 1.5;
    }

    /* Loading */
    .loading-state { text-align: center; padding: 40px 20px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e5e0f5;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-title { font-size: 14px; font-weight: 600; }
    .loading-desc { font-size: 12px; color: #6b7280; margin-top: 4px; }

    /* Results */
    .output-card {
      background: white;
      border: 1.5px solid #e5e0f5;
      border-radius: 14px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: all 0.15s;
    }
    .output-card:hover { border-color: rgba(124, 58, 237, 0.2); }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      cursor: pointer;
    }
    .output-platform {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
    }
    .badge-twitter { background: rgba(29,155,240,0.08); color: #1d9bf0; }
    .badge-linkedin { background: rgba(10,102,194,0.08); color: #0a66c2; }
    .badge-instagram { background: rgba(225,48,108,0.08); color: #c13584; }
    .badge-youtube { background: rgba(255,0,0,0.08); color: #cc0000; }
    .badge-email { background: rgba(124,58,237,0.08); color: #7c3aed; }
    .badge-telegram { background: rgba(42,171,238,0.08); color: #0088cc; }
    .badge-reddit { background: rgba(255,69,0,0.08); color: #e04000; }
    .badge-medium { background: rgba(0,0,0,0.05); color: #333; }
    .badge-tiktok { background: rgba(255,0,80,0.08); color: #e0004e; }
    .badge-substack { background: rgba(255,102,0,0.08); color: #e05500; }
    .badge-threads { background: rgba(0,0,0,0.05); color: #333; }
    .badge-pinterest { background: rgba(230,0,35,0.08); color: #c8002d; }

    .copy-btn {
      display: flex; align-items: center; gap: 4px;
      padding: 5px 10px;
      border-radius: 8px;
      border: none;
      font-size: 11px; font-weight: 600;
      cursor: pointer;
      background: rgba(124, 58, 237, 0.06);
      color: #7c3aed;
      transition: all 0.15s;
    }
    .copy-btn:hover { background: rgba(124, 58, 237, 0.12); }
    .copy-btn.copied {
      background: rgba(22, 163, 74, 0.08);
      color: #16a34a;
    }

    .output-body {
      display: none;
      padding: 0 14px 14px;
    }
    .output-body.open { display: block; }
    .output-text {
      font-size: 13px;
      line-height: 1.6;
      color: #374151;
      white-space: pre-wrap;
      background: #f8f7ff;
      padding: 12px;
      border-radius: 10px;
      max-height: 300px;
      overflow-y: auto;
    }

    /* Error */
    .error-state { text-align: center; padding: 40px 20px; }
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fee2e2;
      border-radius: 10px;
      padding: 12px;
      font-size: 13px;
      color: #dc2626;
    }
    .retry-btn {
      margin-top: 12px;
      padding: 10px 20px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Source info */
    .source-info {
      padding: 8px 14px;
      background: #f0eeff;
      border-radius: 10px;
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .source-info strong { color: #1a1a2e; }
    .char-count {
      font-size: 11px;
      color: #6b7280;
    }

    .chevron {
      transition: transform 0.15s;
      color: #a1a1aa;
    }
    .chevron.open { transform: rotate(180deg); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>
      </svg>
    </div>
    <div class="header-title">Repurpose<span>Hub</span></div>
  </div>

  <div class="platforms-bar" id="platforms-bar"></div>

  <div class="content">
    <!-- Empty state -->
    <div class="state active" id="state-empty">
      <div class="empty-state">
        <div class="empty-icon">⚡</div>
        <div class="empty-title">Ready to repurpose</div>
        <div class="empty-desc">Highlight text on any page and right-click → "Repurpose with RepurposeHub"</div>
      </div>
    </div>

    <!-- Loading -->
    <div class="state" id="state-loading">
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-title">Repurposing your content...</div>
        <div class="loading-desc" id="loading-platforms">Creating 12 platform versions</div>
      </div>
    </div>

    <!-- Results -->
    <div class="state" id="state-results">
      <div class="source-info" id="source-info"></div>
      <div id="results-container"></div>
    </div>

    <!-- Error -->
    <div class="state" id="state-error">
      <div class="error-state">
        <div class="error-msg" id="error-msg">Something went wrong.</div>
        <button class="retry-btn" id="btn-retry">Try Again</button>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
